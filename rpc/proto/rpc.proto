syntax = "proto3";

import "sigmap/sigmap.proto";

option go_package = "sigmaos/rpc/proto";

message MetricsReq {
}

message MetricsRep {
  uint64 RIF = 1;
}

message Req {
        string method = 1;
}

message Rep {
        Rerror err = 1;
}

message SplitIoVec {
        repeated bytes iov = 1;
}

// Users of rpc package can use Blob to pass data directly through to
// the transport without the rpc package marshaling it.
message Blob {
        repeated bytes iov = 1;
        repeated SplitIoVec splitIov = 2;
}

// GenericBlobRep is a service-agnostic response container for delegated RPC
// replies from any blob-returning service. Wire-compatible with S3Rep, UXRep,
// and any future service reply that follows the convention:
//   bool oK = 1; Blob blob = 2.
message GenericBlobRep {
        bool oK = 1;
        Blob blob = 2;
}
