syntax = "proto3";

option go_package = "sigmaos/proc";
import "google/protobuf/timestamp.proto";
import "sigmap/sigmap.proto";
import "rpc/proto/rpc.proto";

message ProcSeqno {
  uint64 epoch = 1;
  uint64 seqno = 2;
  string procqID = 3;
  string mSchedID = 4;
}

message ResourceReservationProto {
  uint32 mcpuInt = 1;
  uint32 memInt = 2; // memory reservation, in MB
}

message ProcEnvProto {
  string pidStr = 1;
  string program = 2;
  string realmStr = 3;
  Tprincipal principal = 4;
  string procDir = 5;
  string parentDir = 6;
  map<string, TendpointProto> etcdEndpoints = 7;
  string outerContainerIPStr = 8;
  string innerContainerIPStr = 9;
  string kernelID = 10;
  string buildTag = 11;
  string perf = 12;
  string debug = 13;
  string procdPIDStr = 14;
  bool privileged = 15;
  int32 howInt = 16;
  google.protobuf.Timestamp spawnTimePB = 17;
  string strace = 18;
  bool useSPProxy = 19;
  bool useDialProxy = 20;
  map<string, SecretProto> secretsMap = 21;
  repeated string sigmaPath = 22;
  repeated string kernels = 23;
  string realmSwitchStr = 24;
  string version = 25;
  string fail = 26;
  map<string, TendpointProto> cachedEndpoints = 27;
  string valgrind = 28;
  bool runCoSandboxFlag = 29;
  bool useShmem = 30;
  uint64 shmemMBInt = 31;
  bool useSPProxyProcClnt = 32;
  string debugProcs = 33;
  ProcContainerType containerType = 34;
}

enum ProcContainerType {
  PROC_CTR_NATIVE = 0;
  PROC_CTR_WASM = 1;
  PROC_CTR_PYTHON = 2;
}

message ProcProto {
  ProcEnvProto procEnvProto = 1;
  repeated string args = 2;
  repeated string addedBins = 3;
  map<string, string> env = 4;
  Blob blob = 5; // boot script
  bytes coSandboxInput = 6;
  uint32 typeInt = 7;
  bool runAfterCoSandbox = 8;
  uint64 queueableResourcePoolID = 9;
  ResourceReservationProto resourceRes = 10;
  ResourceReservationProto coSandboxResourceRes = 11;
  bool measurePSS = 12;
  uint64 measurePSSDelayMS = 13;
}
